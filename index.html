<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ─── Favicon & App Icons ─── -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />

    <!-- ─── Viewport & PWA ─── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Neeva AI">
    <meta name="format-detection" content="telephone=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#8b5cf6">

    <!-- ─── Primary Meta ─── -->
    <title>Neeva AI — Your Mental Wellness Companion</title>
    <meta name="description" content="Neeva AI is your personal mental wellness companion — offering AI-powered therapy support, mood tracking, CBT exercises, guided meditation, and crisis support, 24/7." />
    <meta name="keywords" content="mental health, AI therapy, wellness app, mood tracker, CBT, guided meditation, Neeva AI" />
    <meta name="author" content="Neeva AI" />
    <meta name="robots" content="noindex, nofollow">

    <!-- ─── Open Graph (Facebook, WhatsApp, LinkedIn previews) ─── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Neeva AI — Your Mental Wellness Companion" />
    <meta property="og:description" content="Your personal AI-powered mental wellness companion. Talk to Neeva anytime — mood tracking, CBT, guided meditation & 24/7 emotional support." />
    <meta property="og:image" content="/logo.svg" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="Neeva AI Logo" />
    <meta property="og:site_name" content="Neeva AI" />
    <meta property="og:locale" content="en_US" />

    <!-- ─── Twitter / X Card ─── -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Neeva AI — Your Mental Wellness Companion" />
    <meta name="twitter:description" content="Your personal AI-powered mental wellness companion. Talk to Neeva anytime." />
    <meta name="twitter:image" content="/logo.svg" />
    <meta name="twitter:image:alt" content="Neeva AI Logo" />

    <!-- ─── Google Fonts: Plus Jakarta Sans (primary) + Inter (secondary) ─── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- ─── Splash Screen Styles (inline for instant render) ─── -->
    <style>
      #neeva-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse at 30% 20%, rgba(236,72,153,0.08) 0%, transparent 50%),
          radial-gradient(ellipse at 70% 30%, rgba(59,130,246,0.07) 0%, transparent 50%),
          radial-gradient(ellipse at 50% 70%, rgba(139,92,246,0.06) 0%, transparent 50%),
          linear-gradient(145deg, #fafbff 0%, #f0f4ff 40%, #faf5ff 100%);
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #neeva-splash.splash-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .splash-logo-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: splash-breathe 3s ease-in-out infinite;
      }
      .splash-glow {
        position: absolute;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(139,92,246,0.2) 0%, rgba(236,72,153,0.08) 40%, transparent 70%);
        animation: splash-glow-pulse 3s ease-in-out infinite;
      }
      .splash-logo-svg {
        position: relative;
        z-index: 1;
        width: 120px;
        height: 120px;
      }
      .splash-wordmark {
        margin-top: 24px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700;
        font-size: 28px;
        background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.03em;
      }
      .splash-tagline {
        margin-top: 8px;
        font-family: 'Inter', sans-serif;
        font-weight: 400;
        font-size: 14px;
        color: #94a3b8;
        letter-spacing: 0.02em;
      }
      @keyframes splash-breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }
      @keyframes splash-glow-pulse {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 0.85; transform: scale(1.1); }
      }
      @media (prefers-color-scheme: dark) {
        #neeva-splash {
          background:
            radial-gradient(ellipse at 30% 20%, rgba(236,72,153,0.05) 0%, transparent 50%),
            radial-gradient(ellipse at 70% 30%, rgba(59,130,246,0.05) 0%, transparent 50%),
            radial-gradient(ellipse at 50% 70%, rgba(139,92,246,0.04) 0%, transparent 50%),
            linear-gradient(145deg, #0f172a 0%, #1e1b4b 40%, #0f172a 100%);
        }
        .splash-tagline { color: #64748b; }
      }
    </style>
  </head>
  <body>
    <!-- ─── Splash Screen (disappears when React mounts) ─── -->
    <div id="neeva-splash">
      <div class="splash-logo-wrap">
        <div class="splash-glow"></div>
        <svg class="splash-logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="splash-holo" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ec4899"/>
              <stop offset="25%" stop-color="#a855f7"/>
              <stop offset="50%" stop-color="#8b5cf6"/>
              <stop offset="75%" stop-color="#3b82f6"/>
              <stop offset="100%" stop-color="#06b6d4"/>
            </linearGradient>
            <filter id="splash-shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <circle cx="50" cy="50" r="46" fill="url(#splash-holo)" opacity="0.1"/>
          <path d="M50 22 C38 22, 22 30, 22 46 C22 56, 28 64, 36 68 C38 74, 44 80, 50 80" stroke="url(#splash-holo)" stroke-width="3" stroke-linecap="round" fill="none" filter="url(#splash-shadow)"/>
          <path d="M44 30 C34 32, 28 40, 30 50" stroke="url(#splash-holo)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M30 50 C28 56, 32 62, 38 64" stroke="url(#splash-holo)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M50 22 C62 22, 78 30, 78 46 C78 56, 72 64, 64 68 C62 74, 56 80, 50 80" stroke="url(#splash-holo)" stroke-width="3" stroke-linecap="round" fill="none" filter="url(#splash-shadow)"/>
          <path d="M56 30 C66 32, 72 40, 70 50" stroke="url(#splash-holo)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M70 50 C72 56, 68 62, 62 64" stroke="url(#splash-holo)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <line x1="50" y1="26" x2="50" y2="76" stroke="url(#splash-holo)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
          <circle cx="50" cy="34" r="2.5" fill="url(#splash-holo)" opacity="0.9"/>
          <circle cx="38" cy="46" r="2" fill="url(#splash-holo)" opacity="0.7"/>
          <circle cx="62" cy="46" r="2" fill="url(#splash-holo)" opacity="0.7"/>
          <circle cx="50" cy="58" r="2.5" fill="url(#splash-holo)" opacity="0.9"/>
        </svg>
      </div>
      <div class="splash-wordmark">Neeva AI</div>
      <div class="splash-tagline">Your Wellness Companion</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
